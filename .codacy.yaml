---
# Codacy configuration.
#
# index.js is a small CLI whose whole purpose is to read a user-specified yml
# file, parse it with js-yaml, and write the sorted result back. Codacy's
# security/dependency engines therefore raise unavoidable false positives on it
# (yaml.load "RCE" — js-yaml v4+ load() is safe by default; "dynamically
# constructs path" — reading/writing the user-provided path is the tool's job;
# "Dependency yargs cannot be verified" — artifact of analysing import() in
# isolation; "Using Node.js modules is forbidden" — this is a Node.js CLI).
#
# These are accepted as false positives, so index.js is excluded from analysis.
# Linting for local development is still provided by .eslintrc.json.
exclude_paths:
  - "index.js"
  - "**/index.js"
