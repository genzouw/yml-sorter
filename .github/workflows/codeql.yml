name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 毎週月曜 03:00 JST (= 日曜 18:00 UTC) に main を再スキャン
    - cron: '0 18 * * 0'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # frontend は tsx、backend は ts。両方とも 'javascript-typescript' でまとめてスキャン。
        language: ['javascript-typescript']
    steps:
      - name: Checkout
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          languages: ${{ matrix.language }}
          # security-extended は誤検知が増えるため、まずは security-and-quality で運用。
          # ノイズが多い場合は 'security' に下げる。
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@78ed0c7291d93e40c51b085850dc669a4c3ab73b # v3
        with:
          category: '/language:${{ matrix.language }}'
